# ============================================================================
# Bootstrap step 4 : Root Application (pattern "app-of-apps")  — Approche B
# ============================================================================
# Choix de chaînage (Approche B, 2026-05-23) :
#   Root Application  --> environments/<env>/  --> apps/iun/  --> (futures Apps)
#
# La Root pointe sur l'overlay env (environments/dev par défaut) et NON
# directement sur apps/iun, pour conserver la capacité d'overlay Kustomize
# par environnement (replicas, patches, etc.).
#
# Bootstrap-IUN.ps1 patche dynamiquement metadata.name et source.path en
# remplaçant `environments/dev` par `environments/<env>` selon -Environment.
#
# Hébergé dans l'instance Argo CD dédiée `iun-argocd` (namespace `iun-gitops`).
# Ne gère QUE les ressources IUN-spécifiques — les Operators socle sont
# prérequis externes (cf. README §0).
# ============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iun-root-dev
  namespace: iun-gitops
  labels:
    app.kubernetes.io/part-of: iun-platform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  source:
    repoURL: https://github.com/enguser-1/iun-gitops.git
    targetRevision: HEAD
    path: environments/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: iun-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
