# ============================================================================
# Argo CD Application : iun-api-hello
# ============================================================================
# Premiere Application Argo CD "applicative" du programme IUN.
# Deploie le PoC hello-Quarkus depuis le repo separe `iun-api` vers le
# namespace `iun-sandbox`.
#
# Approche B : on ne touche pas aux Operators (cluster partage), uniquement
# aux CR metier (Deployment / Service / Route ici). Quand iun-api passera de
# PoC a "vrai" service, on ajoutera ses CR Keycloak / CNPG / Kafka dans des
# Applications dedides (cf. `apps/iun/README.md`).
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: iun-api-hello
  namespace: iun-gitops
  labels:
    app.kubernetes.io/name: iun-api
    app.kubernetes.io/part-of: iun-platform
    app.kubernetes.io/component: api
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  source:
    repoURL: https://github.com/enguser-1/iun-api.git
    targetRevision: main
    path: deploy
    kustomize:
      images: []
  destination:
    server: https://kubernetes.default.svc
    namespace: iun-sandbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
