apiVersion: v1
kind: Secret
metadata:
  name: openimis-db
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: postgres
type: Opaque
stringData:
  POSTGRES_DB: openimis
  POSTGRES_USER: openimis
  POSTGRES_PASSWORD: "ChangeMe_DevOnly_01!"
