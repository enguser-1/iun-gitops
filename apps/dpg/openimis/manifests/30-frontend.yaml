# Frontend NGINX + React — fix CAP_CHOWN + nodeSelector compute03
apiVersion: v1
kind: Service
metadata:
  name: openimis-frontend
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openimis-frontend
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: openimis
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openimis
        app.kubernetes.io/component: frontend
      annotations:
        openshift.io/required-scc: anyuid
    spec:
      serviceAccountName: openimis-sa
      nodeSelector:
        kubernetes.io/hostname: compute03
      containers:
        - name: frontend
          image: ghcr.io/openimis/openimis-fe:25.10
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: openimis-app-config
          env:
            - name: OPENSEARCH_BASIC_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openimis-opensearch
                  key: OPENSEARCH_BASIC_TOKEN
            - name: NGINX_PORT
              value: "8080"
          readinessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            tcpSocket: { port: 8080 }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "SETUID", "SETGID", "DAC_OVERRIDE"]
            runAsNonRoot: false
            runAsUser: 0