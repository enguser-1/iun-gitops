# ============================================================================
# OpenSearch — moteur de recherche / dashboards reports OpenIMIS
# ============================================================================
# ⚠ OpenSearch sur OCP requiert vm.max_map_count >= 262144 (sysctl host).
# En sandbox/dev on tolère un nœud potentiellement instable au-delà de
# quelques milliers de documents — voir README "Risques" §3.
# Pour staging/prod : appliquer un Tuned profile cluster pour relever le sysctl.
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: openimis-opensearch
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: opensearch
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 9200
      targetPort: 9200
      protocol: TCP
    - name: transport
      port: 9300
      targetPort: 9300
      protocol: TCP
  selector:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: opensearch
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: openimis-opensearch
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: opensearch
spec:
  serviceName: openimis-opensearch
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openimis
      app.kubernetes.io/component: opensearch
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openimis
        app.kubernetes.io/component: opensearch
    spec:
      serviceAccountName: openimis-sa
      containers:
        - name: opensearch
          image: opensearchproject/opensearch:2.13.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            - name: discovery.type
              value: single-node
            - name: cluster.name
              value: openimis-local
            - name: plugins.security.disabled
              value: "true"
            - name: plugins.security.ssl.http.enabled
              value: "false"
            - name: OPENSEARCH_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
            - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openimis-opensearch
                  key: OPENSEARCH_PASSWORD
          volumeMounts:
            - name: data
              mountPath: /usr/share/opensearch/data
          readinessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 40
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /_cluster/health
              port: 9200
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: "300m"
              memory: "1Gi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/name: openimis
          app.kubernetes.io/component: opensearch
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: ocs-storagecluster-ceph-rbd
        resources:
          requests:
            storage: 30Gi
