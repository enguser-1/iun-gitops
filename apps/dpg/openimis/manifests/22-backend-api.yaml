# ============================================================================
# Backend API — Django REST + GraphQL (compose service `backend`, command: start)
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: openimis-backend
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openimis-backend
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: openimis
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openimis
        app.kubernetes.io/component: backend
    spec:
      serviceAccountName: openimis-sa
      containers:
        - name: backend
          image: ghcr.io/openimis/openimis-be:25.10
          imagePullPolicy: IfNotPresent
          args: ["start"]
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: openimis-app-config
            - secretRef:
                name: openimis-db
            - secretRef:
                name: openimis-django
            - secretRef:
                name: openimis-opensearch
          env:
            # Compose ajoute le password Redis dans CACHE_OPTIONS au runtime
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openimis-redis
                  key: REDIS_PASSWORD
            - name: CACHE_OPTIONS
              value: '{"PASSWORD":"$(REDIS_PASSWORD)"}'
          volumeMounts:
            - name: photos
              mountPath: /openimis-be/openIMIS/images/insurees
          readinessProbe:
            httpGet:
              path: /api/
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 10
          livenessProbe:
            httpGet:
              path: /api/
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: "300m"
              memory: "768Mi"
            limits:
              cpu: "1500m"
              memory: "2Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: photos
          persistentVolumeClaim:
            claimName: openimis-photos
