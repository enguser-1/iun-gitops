# ============================================================================
# Redis — broker cache Django + queue cache pour worker
# ============================================================================
apiVersion: v1
kind: Service
metadata:
  name: openimis-redis
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openimis-redis
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  strategy:
    type: Recreate  # cache éphémère iter 1, pas de PVC → Recreate suffit
  selector:
    matchLabels:
      app.kubernetes.io/name: openimis
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openimis
        app.kubernetes.io/component: redis
      annotations:
        # redis:7-alpine déclare USER 999 (user `redis` standard) — restricted-v2
        # refuse. anyuid pour accepter cet UID stable. Pas de PVC sur redis iter 1
        # (Recreate strategy) -> pas de fsGroup nécessaire.
        openshift.io/required-scc: anyuid
    spec:
      serviceAccountName: openimis-sa
      securityContext:
        runAsUser: 999
        runAsGroup: 999
      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          args:
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--maxmemory"
            - "256mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          envFrom:
            - secretRef:
                name: openimis-redis
          readinessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            exec:
              command: ["sh", "-c", "redis-cli -a \"$REDIS_PASSWORD\" ping"]
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 999
            seccompProfile:
              type: RuntimeDefault
