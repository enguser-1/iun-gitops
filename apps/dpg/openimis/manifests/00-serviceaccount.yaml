# ============================================================================
# ServiceAccount openimis-sa — porteur des SCC OpenShift pour les pods OpenIMIS
# ============================================================================
# Les images upstream (postgres OpenIMIS custom, opensearch) ne sont pas garanties
# rootless. En dev, on accepte `nonroot-v2` ; si un pod CrashLoop pour cause
# d'UID, escalade ciblée vers `anyuid` documentée dans README.md.
#
# Bind SCC à exécuter HORS GitOps (admin cluster) :
#   oc adm policy add-scc-to-user nonroot-v2 -z openimis-sa -n openimis-dev
#   # fallback si nécessaire :
#   # oc adm policy add-scc-to-user anyuid     -z openimis-sa -n openimis-dev
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openimis-sa
  namespace: openimis-dev
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/part-of: iun-platform
