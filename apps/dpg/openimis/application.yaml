# ============================================================================
# Argo CD Application : OpenIMIS (Insurance Management Information System)
# ============================================================================
# Rôle TOR §3.2 C3, §4.4 — gestion des affiliations / cotisations / prestations
# pour CMU, IPRES, CSS, PNBSF (Programme National Bourses Sécurité Familiale).
# IUN MOSIP comme clé primaire de toutes les affiliations.
#
# Packaging : OpenIMIS NE FOURNIT PAS de Helm chart upstream officiel. Après
# arbitrage des 3 options (A: kompose+kustomize / B: fork communautaire /
# C: contribution upstream), nous avons retenu **option A** — voir README §1.
#
# Cette Application Argo CD pointe désormais sur `manifests/` (Kustomize plain,
# pas de Helm) qui héberge les manifestes K8s adaptés du docker-compose
# officiel `openimis-dist_dkr` v25.10.
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openimis-core
  namespace: iun-gitops
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/part-of: iun-platform
    app.kubernetes.io/component: dpg-social-protection
    iun.sn/dpg: openimis
  annotations:
    iun.sn/tor-ref: "§3.2 C3, §4.4"
    iun.sn/packaging: "option-A — kompose convert + kustomize OCP-adapted"
    iun.sn/upstream-version: "25.10 (openimis-dist_dkr Nov 2025)"
    iun.sn/status: "iter 1 — MVP déployable (DB+Redis+RabbitMQ+OS+BE+Worker+FE+Route)"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  source:
    repoURL: https://github.com/enguser-1/iun-gitops.git
    targetRevision: HEAD
    path: apps/dpg/openimis/manifests
    # Kustomize plain — pas de Helm tant que l'upstream n'aura pas mergé un chart
  destination:
    server: https://kubernetes.default.svc
    namespace: openimis-dev
  syncPolicy:
    automated:
      prune: false        # iter 1 : on garde manuel pour observer les diffs
      selfHeal: false     # idem
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    # OCP injecte des annotations et secrets ServiceAccount à la volée
    - group: ""
      kind: ServiceAccount
      jsonPointers:
        - /imagePullSecrets
        - /secrets
  revisionHistoryLimit: 5
