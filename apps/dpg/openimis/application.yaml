# ============================================================================
# Argo CD Application : OpenIMIS (Insurance Management Information System)
# ============================================================================
# Rôle TOR §3.2 C3, §4.4 — gestion des affiliations / cotisations / prestations
# pour CMU, IPRES, CSS, PNBSF (Programme National Bourses Sécurité Familiale).
# IUN comme clé primaire de toutes les affiliations.
#
# ⚠ AVERTISSEMENT MAJEUR — source officielle :
#   OpenIMIS NE FOURNIT PAS de Helm chart officiel à ce jour. Le déploiement
#   canonique est `openimis-dist_dkr` (docker-compose all-in-one).
#
#   Conséquence : nous avons trois options, toutes documentées dans le README :
#     (A) Adapter docker-compose → Kubernetes manifests via `kompose convert`
#         puis kustomize / Helm fait maison. Effort moyen.
#     (B) Cloner et étendre un fork communautaire (qq fork OpenIMIS Helm
#         existent en early-stage sur GitHub — à auditer).
#     (C) Demander à la communauté OpenIMIS si une initiative Helm est en
#         cours (canal #deployment sur leur Atlassian Wiki / community).
#
# Cette Application Argo CD est un PLACEHOLDER qui pointe sur un repo
# kustomize interne à créer. À reconfigurer après l'arbitrage (A) / (B) / (C).
# ============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: openimis-core
  namespace: iun-gitops
  labels:
    app.kubernetes.io/name: openimis
    app.kubernetes.io/part-of: iun-platform
    app.kubernetes.io/component: dpg-social-protection
    iun.sn/dpg: openimis
  annotations:
    iun.sn/tor-ref: "§3.2 C3, §4.4"
    iun.sn/status: "placeholder — pas de Helm chart officiel upstream, voir README"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  source:
    # ⚠ PLACEHOLDER — pointe sur un sous-chemin de ce repo qui hébergera, en
    # phase 1, les manifests Kubernetes adaptés du docker-compose officiel.
    # Le chemin n'existe pas encore : c'est le chantier T+1 OpenIMIS.
    repoURL: https://github.com/enguser-1/iun-gitops.git
    targetRevision: HEAD
    path: apps/dpg/openimis/manifests-kompose-tbd  # à créer
    # Pas de helm: ici tant qu'on n'a pas tranché (A)/(B)/(C). Kustomize plain.
  destination:
    server: https://kubernetes.default.svc
    namespace: openimis-dev
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 3
      backoff:
        duration: 30s
        factor: 2
        maxDuration: 5m
  revisionHistoryLimit: 5
