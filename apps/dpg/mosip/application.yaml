# ============================================================================
# Argo CD Applications — MOSIP MVP IUN (itération 1 — étendue v2)
# ============================================================================
# Objectif TOR §4.1.2 / §4.1.3 : génération d'un IUN 9 chiffres + Verhoeff.
# Verhoeff est CÂBLÉ EN DUR dans kernel-idgenerator-service.
#
# Topologie v2 (7 Applications) — voir README.md pour le détail.
#   wave -10 : mosip-bootstrap        — manifests/ (namespace, SCC, CNPG…)
#   wave   5 : mosip-global           — CM `global` (manifeste, PAS chart)
#   wave   6 : mosip-artifactory      — chart, produit CM `artifactory-share`
#   wave   7 : mosip-softhsm-kernel   — chart `mosip/softhsm` releaseName=softhsm-kernel
#   wave  10 : mosip-config-server    — chart `mosip/config-server`
#   wave  20 : mosip-keymanager       — chart `mosip/keymanager`
#   wave  20 : mosip-idgenerator      — chart `mosip/idgenerator` (parallèle keymanager)
#
# ⚠ targetRevision Helm = PLACEHOLDERS — valider avant push :
#   helm repo update mosip
#   helm search repo mosip/<chart> --versions | head
# ============================================================================
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosip-bootstrap
  namespace: iun-gitops
  labels:
    app.kubernetes.io/name: mosip-bootstrap
    app.kubernetes.io/part-of: iun-platform
    iun.sn/dpg: mosip
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
    iun.sn/tor-ref: "§3.2 C2, §4.1"
    iun.sn/role: "Pre-requis cluster MOSIP — namespace + SCC + Postgres + ConfigMap IUN audit"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  source:
    repoURL: https://github.com/enguser-1/iun-gitops.git
    targetRevision: HEAD
    path: apps/dpg/mosip/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: mosip-dev
  syncPolicy:
    automated: {prune: false, selfHeal: false}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
    retry: {limit: 3, backoff: {duration: 30s, factor: 2, maxDuration: 5m}}
  revisionHistoryLimit: 5
---
# mosip-global — ConfigMap `global` cluster-wide (manifeste, PAS chart Helm).
# Source upstream : https://github.com/mosip/k8s-infra/blob/main/mosip/global_configmap.yaml.sample
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosip-global
  namespace: iun-gitops
  labels:
    app.kubernetes.io/name: mosip-global
    app.kubernetes.io/part-of: iun-platform
    iun.sn/dpg: mosip
  annotations:
    argocd.argoproj.io/sync-wave: "5"
    iun.sn/tor-ref: "§4.1 (config cluster-wide MOSIP)"
    iun.sn/role: "ConfigMap global — hostnames + HSM pins partagés MOSIP"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  source:
    repoURL: https://github.com/enguser-1/iun-gitops.git
    targetRevision: HEAD
    path: apps/dpg/mosip/manifests/global-configmap
  destination:
    server: https://kubernetes.default.svc
    namespace: mosip-dev
  syncPolicy:
    automated: {prune: false, selfHeal: false}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry: {limit: 3, backoff: {duration: 30s, factor: 2, maxDuration: 5m}}
  revisionHistoryLimit: 5
---
# mosip-artifactory — chart mosip/artifactory. Produit CM `artifactory-share`.
# Ref : https://github.com/mosip/artifactory-ref-impl
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosip-artifactory
  namespace: iun-gitops
  labels:
    app.kubernetes.io/name: mosip-artifactory
    app.kubernetes.io/part-of: iun-platform
    iun.sn/dpg: mosip
  annotations:
    argocd.argoproj.io/sync-wave: "6"
    iun.sn/tor-ref: "§4.1 (file-server artefacts MOSIP, dev = mock keys)"
    iun.sn/role: "Produit ConfigMap artifactory-share consommée par keymanager + idgenerator"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  sources:
    - repoURL: https://mosip.github.io/mosip-helm
      chart: artifactory
      targetRevision: 12.0.4  # PLACEHOLDER — valider avant push
      helm:
        releaseName: artifactory
        valueFiles:
          - $values/apps/dpg/mosip/values/dev-artifactory.yaml
    - repoURL: https://github.com/enguser-1/iun-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mosip-dev
  syncPolicy:
    automated: {prune: false, selfHeal: false}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry: {limit: 3, backoff: {duration: 30s, factor: 2, maxDuration: 5m}}
  revisionHistoryLimit: 5
---
# mosip-softhsm-kernel — chart mosip/softhsm avec releaseName=softhsm-kernel.
# Produit CM `softhsm-kernel-share`. DEV ONLY. Migration HSM Luna pré-staging.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mosip-softhsm-kernel
  namespace: iun-gitops
  labels:
    app.kubernetes.io/name: mosip-softhsm-kernel
    app.kubernetes.io/part-of: iun-platform
    iun.sn/dpg: mosip
  annotations:
    argocd.argoproj.io/sync-wave: "7"
    iun.sn/tor-ref: "§4.3.2 (crypto — SoftHSM en dev, HSM Luna en prod)"
    iun.sn/role: "Produit ConfigMap softhsm-kernel-share consommée par keymanager"
    iun.sn/dette-technique: "SoftHSM = DEV ONLY. Migration HSM Luna obligatoire pré-staging."
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: iun-platform
  sources:
    - repoURL: https://mosip.github.io/mosip-helm
      chart: softhsm
      targetRevision: 12.0.4  # PLACEHOLDER — valider avant push
      helm:
        releaseName: softhsm-kernel
        valueFiles:
          - $values/apps/dpg/mosip/values/dev-softhsm-kernel.yaml
    - repoURL: https://github.com/enguser-1/iun-gitops.git
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: mosip-dev
  syncPolicy:
    automated: {prune: false, selfHeal: false}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry: {limit: 3, backoff: {duration: 30s, factor: 2, maxDuration: 5m}}
  revisionHistoryLimit: 5
