# ============================================================================
# values dev — chart `postgres-init` (mosip-helm v1.2.0.x — placeholder 12.0.2)
# ============================================================================
# Consommé par l'Application Argo CD `mosip-postgres-init` (sync-wave 9).
#
# Rôle : produit la ConfigMap `postgres-setup-config` consommée par
# config-server, et initialise les schemas MOSIP requis pour le MVP UIN
# (kernel, keymgr, idgenerator). L'audit et l'idmap sont inclus dès le MVP
# car kernel-idgenerator-service les ouvre au boot et un manque provoque
# un CrashLoop transient sur idgenerator.
#
# DB backend : Cluster CNPG `mosip-postgres` (déjà déployé via
# manifests/cnpg-mosip-cluster.yaml). Service R/W = mosip-postgres-rw.
#
# ⚠⚠⚠ INCERTITUDES — À RELIRE AVANT MERGE ⚠⚠⚠
#
# 1. Schéma du chart non vérifié depuis la sandbox déconnectée.
#    Les clés ci-dessous suivent la convention MOSIP postgres-init (env vars
#    SU_USER / SU_USER_PWD / DBUSER_PWD / DB_SERVERIP / DB_PORT) et le pattern
#    OpenG2P postgres-init (qui dérive du chart MOSIP). À valider en local :
#      helm show values mosip/postgres-init --version 12.0.2 > /tmp/schema.yaml
#    et aligner si les noms de clés diffèrent (databases vs db.list,
#    postgresql.host vs db.dbServerIp, etc.).
#
# 2. CNPG `enableSuperuserAccess` par défaut = false (CNPG ≥ 1.21). Le secret
#    `mosip-postgres-superuser` n'existe donc PAS automatiquement. Deux
#    options possibles :
#      (a) Activer enableSuperuserAccess: true sur le Cluster mosip-postgres
#          → CNPG génère mosip-postgres-superuser (user postgres).
#      (b) Garder le secret `mosip-postgres-app` (user `app`, déjà créé) et
#          accepter que postgres-init tourne en non-superuser. Ça marche si
#          le chart fait `CREATE DATABASE` côté user `app` avec CREATEDB —
#          ce qui suppose qu'on lui accorde ce privilège après bootstrap CNPG.
#    Choix par défaut ci-dessous : option (a) — superuser, plus robuste pour
#    le MVP. Si on garde (b), changer existingSecret + ajouter un Job pour
#    GRANT CREATEDB TO app.
#
# 3. Le ConfigMap "postgres-setup-config" attendu par config-server est censé
#    être produit par ce chart. Si le sync mosip-postgres-init reste Healthy
#    mais que config-server reste en CreateContainerConfigError avec la même
#    erreur, c'est que :
#      - le chart produit une CM avec un autre nom (`postgres-config` p.ex.) ;
#      - OU le nom est paramétrable et il faut le forcer ici (clé
#        nameOverride / fullnameOverride ou commonConfigMap.name selon chart).
#    Premier diagnostic après sync : `oc get cm -n mosip-dev | grep postgres`.
# ============================================================================

# -- Postgres backend (CNPG cluster mosip-postgres, R/W service)
postgresql:
  host: mosip-postgres-rw.mosip-dev.svc.cluster.local
  port: 5432
  # Superuser secret généré par CNPG si enableSuperuserAccess: true. Voir
  # incertitude #2 ci-dessus.
  user: postgres
  existingSecret: mosip-postgres-superuser
  existingSecretPostgresPasswordKey: password
  # DB par défaut où se connecter avant de créer les nouvelles bases.
  defaultDatabase: postgres

# -- Schéma alternatif (env vars MOSIP postgres-init container). Présent au
# cas où le chart attend ces clés au top level plutôt que sous `postgresql:`.
# Le Lead doit supprimer le bloc inutile après vérification du schéma réel.
dbserverip: mosip-postgres-rw.mosip-dev.svc.cluster.local
dbport: "5432"
suUser: postgres
suUserPasswordSecret: mosip-postgres-superuser
suUserPasswordSecretKey: password
defaultDbName: postgres
dmlFlag: "1"  # 1 = peupler les données par défaut (masterdata). Indispensable
              # pour kernel-idgenerator-service au premier boot.

# -- Bases MOSIP à initialiser pour le MVP IUN.
# Ordre : kernel d'abord (référentiel), puis dépendances.
# - mosip_kernel    : référentiel master data (machines, centres, doctypes).
#                     Indispensable pour idgenerator (lookups au démarrage).
# - mosip_keymgr    : keys stockées par kernel-keymanager-service (RSA, PKI).
# - mosip_idgenerator: pool de UINs générés (table id_generator + sequences).
# - mosip_audit     : audit trail. kernel-auditmanager le crée si absent mais
#                     log un WARN au boot — autant l'initialiser proprement.
# - mosip_idmap     : table de mapping uin → uin_hash pour anonymisation.
#                     Utilisé par idrepo (post-MVP) mais pré-créé par kernel.
databases:
  - name: mosip_kernel
    user: kerneluser
    # Mot de passe généré aléatoirement et stocké dans le Secret nommé ci-dessous.
    # Ne PAS l'écrire en clair ici.
    password: ""
    secret: db-common-secrets
    secretUserPasswordKey: db-dbuser-password
    extensions:
      - pgcrypto
      - uuid-ossp
  - name: mosip_keymgr
    user: keymgruser
    password: ""
    secret: db-common-secrets
    secretUserPasswordKey: db-dbuser-password
    extensions:
      - pgcrypto
  - name: mosip_idgenerator
    user: idgeneratoruser
    password: ""
    secret: db-common-secrets
    secretUserPasswordKey: db-dbuser-password
    extensions:
      - pgcrypto
  - name: mosip_audit
    user: audituser
    password: ""
    secret: db-common-secrets
    secretUserPasswordKey: db-dbuser-password
    extensions: []
  - name: mosip_idmap
    user: idmapuser
    password: ""
    secret: db-common-secrets
    secretUserPasswordKey: db-dbuser-password
    extensions:
      - pgcrypto

# -- Idempotence : ne pas recréer si la base existe déjà.
skipIfExists: true

# -- Image Job mosip/postgres-init (clientpostgresql + scripts SQL kernel).
# Tag aligné sur le chart targetRevision. Si le chart fixe lui-même l'image,
# ce bloc est ignoré — laissé pour transparence.
image:
  repository: mosipdev/postgres-init
  tag: 1.2.0.1
  pullPolicy: IfNotPresent

# -- Ressources pour le Job init (court, mais peut peupler 50+ tables).
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# -- Garder le Job visible 1h après succès pour debug, puis le laisser cleanup.
ttlSecondsAfterFinished: 3600
backoffLimit: 2
