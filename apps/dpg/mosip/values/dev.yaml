# ============================================================================
# values dev — chart `kernel` (mosip-helm v1.2.0.4)
# ============================================================================
# Consommé par l'Application Argo CD `mosip-kernel` (cf. application.yaml,
# source #1 = mosip-helm chart `kernel`).
#
# Le chart `kernel` est un META-CHART (collection de sub-services Spring Boot
# packagés ensemble — idgenerator-service, cryptomanager-service,
# keymanager-service, auditmanager-service, masterdata-service,
# otpmanager-service, syncdata-service, pridgenerator-service,
# ridgenerator-service, etc.). Chacun a son sous-arbre de values. Ici on
# configure UNIQUEMENT le subset MVP — `kernel-idgenerator-service` en
# première priorité, plus les dépendances strictes (Postgres, config-server).
#
# ⚠ POINTS À VALIDER PAR LE LEAD avant le premier sync :
#   1. Tag du chart effectivement publié : 12.0.4 vs 1.2.0.4 vs v1.2.0.4 ?
#      Cmd : `helm repo update mosip && helm search repo mosip/kernel --versions | head`
#   2. Schéma exact des values (chart-level vs sub-service) :
#      `helm show values mosip/kernel --version <pin> > /tmp/kernel-values-upstream.yaml`
#      puis comparer avec ce fichier — adapter les clés qui ne matchent pas.
#   3. La référence à `config-server` se fait via env var `spring.cloud.config.uri` —
#      vérifier que la valeur ci-dessous matche le Service du chart config-server.
# ============================================================================

# -- Image (LTS la plus récente compatible kernel 1.2.0.4)
# Le tag image MOSIP ≠ tag chart Helm — le chart pointe sur l'image officielle
# mosipid/* du Docker Hub MOSIP.
image:
  pullPolicy: IfNotPresent

# -- Ressources sandbox dev (CLUSTER PARTAGÉ — pas de réservation lourde)
# MOSIP "production reference" demande ~50 vCPU/100Gi RAM. En dev on divise
# par 10 et on accepte des requests basses ; les limites évitent un pod hostile.
resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

# -- Connexion config-server (chart sœur, Application mosip-config-server)
# Service par défaut publié par le chart config-server : `config-server.<ns>:51000`
# (port standard MOSIP). En env-var Spring : SPRING_CLOUD_CONFIG_URI.
springCloudConfig:
  enabled: true
  uri: "http://config-server.mosip-dev.svc.cluster.local:51000/config"
  label: master
  # `default` = profil Spring lu par config-server. Quand on forkera
  # mosip-config en `iun-sn-mosip-config`, basculer ici sur `iun-sn-dev`.
  profile: default

# -- Connexion Postgres (CNPG externe, géré par mosip-bootstrap)
# La CNPG Cluster CR est créée dans manifests/cnpg-mosip-cluster.yaml.
# Service read/write : `mosip-postgres-rw.mosip-dev.svc:5432`.
# Le chart `kernel` provisionne ses DBs via un init-container
# (mosip-postgres-init) — on lui donne juste host + secret.
# CNPG génère le Secret `mosip-postgres-app` (clés: username, password, dbname).
postgres:
  enabled: true
  external: true
  host: mosip-postgres-rw.mosip-dev.svc.cluster.local
  port: 5432
  existingSecret: mosip-postgres-app
  databases:
    kernel: mosip_kernel
    keymanager: mosip_keymgr
    audit: mosip_audit

# -- UIN generator : config Sénégal (TOR §4.1.2 / §4.1.3 — révisé ADR-R01 2026-05-25)
# ATTENTION — Clés CANONIQUES validées contre
# https://github.com/mosip/mosip-config/blob/master/application-default.properties
# Défaut MOSIP : `mosip.kernel.uin.length=10` — conservé suite à ADR-R01 2026-05-25.
# Verhoeff n'est PAS configurable — codé en dur dans kernel-idgenerator-service.
# Le check digit Verhoeff EST le dernier des 10 chiffres ; les 9 autres sont
# aléatoires avec filtres anti-patterns par défaut MOSIP.
overrides:
  # >>> Longueur UIN = défaut MOSIP (ADR-R01 2026-05-25)
  # L'ancien override 9 chiffres a été abandonné : démontré mathématiquement
  # impossible (cf. research/verhoeff/MOSIP-UIN-FEASIBILITY.md, ~39 M max effectif
  # vs besoin 100-130 M sur 50 ans). 10 chiffres = ~164 M IDs, marge ~4 générations.
  mosip.kernel.uin.length: "10"

  # Pool de pré-génération réduit pour dev (default = 500000).
  mosip.kernel.uin.uins-to-generate: "1000"
  mosip.kernel.uin.min-unused-threshold: "100"

  # Filtres anti-patterns : défaut MOSIP (length=10). Aucune dérogation.
  # Les anciens overrides reverse-digits-limit=4 et digits-limit=4 (calibrés
  # pour length=9 abandonné) sont remis à la valeur upstream 5.
  mosip.kernel.uin.length.sequence-limit:          "3"
  mosip.kernel.uin.length.repeating-block-limit:   "2"
  mosip.kernel.uin.length.repeating-limit:         "2"
  mosip.kernel.uin.length.reverse-digits-limit:    "5"
  mosip.kernel.uin.length.digits-limit:            "5"
  mosip.kernel.uin.length.conjugative-even-digits-limit: "3"
  mosip.kernel.uin.not-start-with:    "0,1"
  mosip.kernel.uin.restricted-numbers: "786,666"

  # Resync seed every 45 min — défaut MOSIP, on garde.
  mosip.idgen.uin.secure-random-reinit-frequency: "45"

# -- Sub-services du chart kernel — on N'ACTIVE que ce qui est utile au MVP
# Les autres restent désactivés pour ne pas consommer le cluster partagé.
# Le Lead réactivera au fur et à mesure (websub, masterdata-service, etc.)
# en itération 2.
services:
  idgenerator:
    enabled: true
    replicas: 1
    resources:
      requests: { cpu: 100m, memory: 512Mi }
      limits:   { cpu: 500m, memory: 1Gi }
  cryptomanager:
    # Requis par idgenerator (signature des payloads de génération)
    enabled: true
    replicas: 1
  authmanager:
    # Requis car idgenerator vérifie les tokens — en dev `proxy-otp=true`
    enabled: true
    replicas: 1
  masterdata:
    enabled: false
  auditmanager:
    enabled: true
    replicas: 1
  otpmanager:
    enabled: false
  syncdata:
    enabled: false
  pridgenerator:
    enabled: false
  ridgenerator:
    enabled: false
  saltgenerator:
    enabled: false
  notifier:
    enabled: false
  licensekeymanager:
    enabled: false

# -- Sécurité OpenShift
# MOSIP charts ont plusieurs init-containers qui montent des volumes en root
# (`mosip-postgres-init`, `wait-for-config-server`). On octroie `anyuid` SCC
# au SA via manifests/scc-mosip.yaml. NE PAS accorder `privileged`.
podSecurityContext:
  runAsNonRoot: false
  fsGroup: 1001
serviceAccount:
  create: true
  name: mosip-kernel
  annotations: {}

# -- Ingress vs OpenShift Route
# Le chart upstream propose `ingress.*` (NGINX) ; sur OCP on préfère exposer
# par une Route déclarée séparément. Pour le MVP, on hit le Service en
# cluster-internal (port-forward via oc).
ingress:
  enabled: false

# -- Probes Spring Boot (/actuator/health/{readiness,liveness})
probes:
  readiness:
    httpGet:
      path: /actuator/health/readiness
      port: 8090
    initialDelaySeconds: 60
    periodSeconds: 10
  liveness:
    htt