# ============================================================================
# values dev — chart `config-server` (mosip-helm v1.2.0.4)
# ============================================================================
# Consommé par l'Application Argo CD `mosip-config-server`.
#
# Rôle : Spring Cloud Config Server qui sert les properties à TOUS les modules
# MOSIP. Lit depuis un repo Git public (par défaut mosip/mosip-config) et
# autorise des overrides via env-vars `overrides_*` (convention MOSIP).
#
# ⚠ Stratégie itération 1 :
#   - On NE FORKE PAS mosip-config (overhead inutile pour un MVP).
#   - On override la longueur UIN via env-var `overrides_mosip_kernel_uin_length=9`
#     (le chart config-server transforme ces env-vars en property keys via une
#     règle de "remplacer _ par ." dans le préfixe `overrides_`).
#   - À l'itération 2, quand on aura besoin de >10 overrides, on forkera le
#     repo mosip-config dans enguser-1/iun-sn-mosip-config et on pointera ce
#     fork ici.
# ============================================================================

# -- Image (chart impose mosipid/config-server:<chart version>)
image:
  pullPolicy: IfNotPresent

# -- Repo upstream mosip-config (master = branche stable LTS au moment du
# déploiement ; à figer en branche `release-1.2.0.4` quand confirmé existant)
gitRepo:
  uri: https://github.com/mosip/mosip-config
  branch: master
  # Pas de credentials — repo public
  username: ""
  password: ""
  # Pré-réservé pour search-paths si fork avec sous-dossiers (laisser vide
  # pour le repo upstream qui est plat).
  searchPaths: ""

# -- Overrides Sénégal (clés property remontées au boot)
# Convention MOSIP config-server : env-vars commençant par `overrides_` sont
# transformées en property keys :
#     overrides_mosip_kernel_uin_length = "9"  →  mosip.kernel.uin.length = 9
# On reproduit ICI les mêmes valeurs que dans values/dev.yaml du chart kernel
# (SOURCE de vérité applicative côté kernel ; ici c'est le RELAIS Spring Cloud
# qui sert ces clés à tous les modules MOSIP, pas juste au kernel).
extraEnv:
  - name: overrides_mosip_kernel_uin_length
    value: "9"
  - name: overrides_mosip_kernel_uin_uins_to_generate
    value: "1000"
  - name: overrides_mosip_kernel_uin_min_unused_threshold
    value: "100"
  - name: overrides_mosip_kernel_uin_length_sequence_limit
    value: "3"
  - name: overrides_mosip_kernel_uin_length_repeating_block_limit
    value: "2"
  - name: overrides_mosip_kernel_uin_length_repeating_limit
    value: "2"
  - name: overrides_mosip_kernel_uin_length_reverse_digits_limit
    value: "4"
  - name: overrides_mosip_kernel_uin_length_digits_limit
    value: "4"
  - name: overrides_mosip_kernel_uin_length_conjugative_even_digits_limit
    value: "3"
  - name: overrides_mosip_kernel_uin_not_start_with
    value: "0,1"
  - name: overrides_mosip_kernel_uin_restricted_numbers
    value: "786,666"

# -- Ressources sandbox dev
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 1Gi

# -- Service interne (port standard MOSIP config-server)
service:
  type: ClusterIP
  port: 51000

# -- Pas d'Ingress / Route (interne uniquement)
ingress:
  enabled: false

# -- Probes Spring Boot
probes:
  readiness:
    httpGet:
      path: /actuator/health/readiness
      port: 51000
    initialDelaySeconds: 30
  liveness:
    httpGet:
      path: /actuator/health/liveness
      port: 51000
    initialDelaySeconds: 60
