# ============================================================================
# ConfigMap : audit IUN — format 10 chiffres + Verhoeff (ADR-R01, 2026-05-25)
# ============================================================================
# Rôle TOR §4.1.2 / §4.1.3 / §4.1.4 — révisé par ADR-R01 du 2026-05-25.
# Format IUN aligné sur le défaut MOSIP (uin.length=10) à la suite de la
# décision Lead validée le 2026-05-25, l'option 9 chiffres ayant été
# démontrée mathématiquement impossible (cf. research/verhoeff/
# MOSIP-UIN-FEASIBILITY.md). Filtres anti-patterns MOSIP par défaut conservés.
#
# ⚠ AVERTISSEMENT IMPORTANT — ce ConfigMap est INFORMATIONNEL en itération 1.
# Les overrides RÉELS qui pilotent kernel-idgenerator-service sont injectés
# via env-vars dans l'Application Argo CD mosip-config-server
# (values/dev-config-server.yaml). MOSIP suit la convention Spring Cloud
# Config : les properties viennent du config-server, pas d'un ConfigMap natif
# K8s monté dans le pod.
#
# Cette ConfigMap-ci sert d'AUDIT TRAIL et de référence opérateur : elle
# documente, à un endroit lisible par `oc get cm`, quelles sont les
# surcharges Sénégal attendues. Pas de couplage runtime.
#
# ----------------------------------------------------------------------------
# Cohabitation avec la ConfigMap `global` (créée par mosip-global, wave 5) :
# ----------------------------------------------------------------------------
# - `global`            → consommée en envFrom par TOUS les pods MOSIP.
#                          Contient hostnames, pins HSM, profils Spring.
#                          PAS de propriétés UIN format dedans.
# - `iun-format-audit`  → CETTE ConfigMap. Audit/doc IUN format Sénégal.
#                          PAS de couplage runtime (informationnelle).
# Les deux NE SE CHEVAUCHENT PAS (clés disjointes). Conservation des deux
# justifiée : `global` est upstream-canonical et obligatoire, `iun-format-audit`
# est notre traçabilité d'override TOR.
# ----------------------------------------------------------------------------
#
# Clés CANONIQUES validées contre
# https://github.com/mosip/mosip-config/blob/master/application-default.properties :
#   mosip.kernel.uin.length         = 10   (défaut MOSIP — ADR-R01 2026-05-25)
#   mosip.kernel.uin.uins-to-generate = 1000 (sandbox dev — défaut prod = 500000)
#   mosip.kernel.uin.min-unused-threshold = 100 (sandbox dev — défaut = 200000)
#   ...filtres anti-patterns par défaut MOSIP : voir values/dev.yaml et values/dev-config-server.yaml
#
# CLEFS QUI N'EXISTENT PAS (à NE PAS configurer — erreurs de l'itération précédente) :
#   mosip.kernel.idgenerator.uin.check-digit-algorithm  ← N'EXISTE PAS dans MOSIP.
#     Verhoeff est codé en dur dans kernel-idgenerator-service :
#     https://github.com/mosip/commons/tree/release-1.2.0/kernel/kernel-idgenerator-service
#   iun.display.prefix / iun.display.pattern  ← non gérés par MOSIP.
#     L'affichage SN-NNNN-NNNN-N relève de la couche d'intégration (3scale ou
#     resident-services portal customisé), pas du kernel. À implémenter
#     itération frontend.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: iun-format-audit
  namespace: mosip-dev
  labels:
    app.kubernetes.io/part-of: iun-platform
    iun.sn/dpg: mosip
    iun.sn/purpose: audit-uin-overrides
  annotations:
    iun.sn/tor-ref: "§4.1.2, §4.1.3, §4.1.4"
    iun.sn/status: "informational — runtime overrides via config-server env-vars"
    iun.sn/canonical-source: "mosip-config/application-default.properties @ master"
data:
  # -- Longueur IUN — défaut MOSIP confirmé (ADR-R01, 2026-05-25)
  # 10 chiffres dont le 10ᵉ EST le check digit Verhoeff (les 9 premiers
  # sont aléatoires, le 10ᵉ est calculé). Plus d'override Sénégal :
  # on s'aligne sur le défaut MOSIP pour rester sur le chemin pavé.
  mosip.kernel.uin.length: "10"

  # -- Algorithme de contrôle (NON CONFIGURABLE — informatif)
  # Verhoeff est hardcodé dans kernel-idgenerator-service.
  _doc.check-digit-algorithm: "VERHOEFF (hardcoded in kernel-idgenerator-service)"

  # -- Pool initial sandbox dev (vs 500000 en prod)
  mosip.kernel.uin.uins-to-generate:    "1000"
  mosip.kernel.uin.min-unused-threshold: "100"

  # -- Filtres anti-patterns — défaut MOSIP (ADR-R01, 2026-05-25)
  # Valeurs upstream MOSIP conservées (length=10) ; les anciens overrides
  # reverse-digits-limit=4 et digits-limit=4 (calibrés pour length=9 abandonné)
  # sont revenus à 5. Aucune dérogation vs spec MOSIP à length=10.
  mosip.kernel.uin.length.sequence-limit:                  "3"
  mosip.kernel.uin.length.repeating-block-limit:           "2"
  mosip.kernel.uin.length.repeating-limit:                 "2"
  mosip.kernel.uin.length.reverse-digits-limit:            "5"
  mosip.kernel.uin.length.digits-limit:                    "5"
  mosip.kernel.uin.length.conjugative-even-digits-limit:   "3"
  mosip.kernel.uin.not-start-with:                         "0,1"
  mosip.kernel.uin.restricted-numbers:                     "786,666"

  # -- Re-seed crypto RNG (défaut MOSIP — 45