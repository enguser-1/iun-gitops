apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# ============================================================================
# apps/dpg/mosip/kustomization.yaml
# ============================================================================
# Référencé par environments/dev/kustomization.yaml via la Root Application
# `iun-root-dev` (cf. bootstrap/04-root-application.yaml). Cette Kustomization
# définit le PORTEFEUILLE d'Argo CD Applications MOSIP — toutes les CR
# `Application` qui doivent exister dans le namespace `iun-gitops`.
#
# Les CR métier (namespace mosip-dev, SCC, CNPG Cluster, etc.) sont déclarées
# dans manifests/ et synchronisées par l'Application `mosip-bootstrap`
# (définie dans application.yaml multi-doc).
# ============================================================================
namespace: iun-gitops

resources:
  - application.yaml   # multi-doc : mosip-bootstrap + 3 charts MOSIP
