apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Overlay prod (Approche B) : versions figées, installPlanApproval = Manual côté
# Operators *si* on les gérait — mais ici on ne gère que les CR IUN
# (Operators = prérequis externes, cf. apps/iun/README.md).
namespace: iun-gitops
resources:
  - ../../apps/iun
