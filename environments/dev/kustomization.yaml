apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# ============================================================================
# Overlay dev — Approche DPG (pivot 2026-05-24)
# ============================================================================
# Agrège les Applications Argo CD des 3 DPG (MOSIP, OpenCRVS, OpenIMIS).
# Les Operators socle (OCP GitOps, RHBK, CNPG, AMQ Streams, ODF, etc.)
# restent des prérequis externes : ils sont installés cluster-wide par
# d'autres équipes et NE sont PAS gérés par notre instance Argo CD dédiée.
# ============================================================================
namespace: iun-gitops

resources:
  - ../../apps/dpg/mosip
  - ../../apps/dpg/opencrvs
  - ../../apps/dpg/openimis

