apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Overlay dev (Approche B) : agrège uniquement les Applications IUN-spécifiques.
# Les Operators socle sont prérequis externes (déjà installés par d'autres équipes
# sur ce cluster partagé) — ils ne sont pas gérés par notre Argo CD.
namespace: iun-gitops
resources:
  - ../../apps/iun
